<!DOCTYPE html>
<html>
<head>
    <title>Nexus</title>
    <style>
        body {
            background: #0000FF; 
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            transition: background 0.5s ease;
            overflow: hidden; 
        }

        /* --- Loading Screen Styles --- */
        #loadingScreen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #111; /* Sleek dark background for loading */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading-logo svg {
            width: 120px;
            height: 120px;
            animation: spinAndScale 2s ease-in-out infinite;
        }

        .loading-logo .green-path {
            animation: morphGreen 2s ease-in-out infinite;
        }

        .loading-logo .blue-path {
            animation: morphBlue 2s ease-in-out infinite;
        }

        #loadingScreen h1 {
            color: #fff;
            margin-top: 20px;
            font-size: 24px;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        /* Morphing SVG Keyframes */
        @keyframes spinAndScale {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes morphGreen {
            0%, 100% { d: path('M 27 45 L 27 15 L 12 15'); }
            50% { d: path('M 45 45 L 15 45 L 15 15'); } /* Forms the bottom and left side of the rectangle */
        }

        @keyframes morphBlue {
            0%, 100% { d: path('M 33 15 L 33 45 L 48 45'); }
            50% { d: path('M 15 15 L 45 15 L 45 45'); } /* Forms the top and right side of the rectangle */
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* --- Secret Nexus Background Pattern --- */
        .nexus-bg {
            background-color: #0b0c10 !important; 
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><path d="M 27 45 L 27 15 L 12 15" fill="none" stroke="%232ecc71" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 33 15 L 33 45 L 48 45" fill="none" stroke="%233498db" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/></svg>') !important;
            background-size: 80px 80px !important;
            background-repeat: repeat !important;
        }

        /* --- Easter Egg Animations --- */
        @keyframes roll {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .barrel-roll { animation: roll 1s ease-in-out; }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .earthquake { animation: shake 0.5s; animation-iteration-count: 3; }

        /* --- Typing Indicator Animations --- */
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .typing-indicator-box {
            display: flex; gap: 4px; padding: 12px 15px; 
            align-items: center; width: fit-content;
        }
        .typing-dot {
            width: 6px; height: 6px; background: #4834d4; 
            border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both;
        }
        .dark-card .typing-dot { background: #a29bfe; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        /* --- Matrix Canvas --- */
        #matrixCanvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; display: none;
        }

        .matrix-mode {
            background: rgba(0, 0, 0, 0.85) !important; color: #00FF41 !important;
            border: 1px solid #00FF41 !important; box-shadow: 0 0 20px #00FF41 !important;
        }
        .matrix-mode input, .matrix-mode button {
            background: #111 !important; color: #00FF41 !important; border-color: #00FF41 !important;
        }
        .matrix-mode .bot-msg { background: #002200 !important; color: #00FF41 !important; border-left-color: #00FF41 !important; }
        .matrix-mode .user-msg { background: #004400 !important; color: #00FF41 !important; }
        .matrix-mode h1, .matrix-mode h2, .matrix-mode h3, .matrix-mode p, .matrix-mode span { color: #00FF41 !important; }
        .matrix-mode .typing-dot { background: #00FF41 !important; }
        .matrix-mode .bot-avatar, .matrix-mode .user-avatar { background: #004400 !important; color: #00FF41 !important; border: 1px solid #00FF41; }

        /* --- Main Card Styles --- */
        .card {
            background: white; color: #333; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 420px; transition: all 0.3s ease;
            max-height: 90vh; display: flex; flex-direction: column;
            position: relative; overflow: hidden; 
            box-sizing: border-box;
        }
        .dark-card { background: #1e1e1e !important; color: #ffffff !important; }

        /* --- Logo Styles --- */
        .logo { margin-bottom: 20px; text-align: center; }
        .logo svg { display: block; margin: 0 auto 10px auto; width: 80px; height: 80px; }
        .logo h1 { margin: 0; font-size: 36px; color: #6c5ce7; letter-spacing: 2px; text-transform: uppercase; }
        .dark-card .logo h1 { color: #a29bfe; }

        .small-logo { margin: 0; display: flex; align-items: center; gap: 10px; }
        .small-logo svg { width: 40px; height: 40px; margin: 0; }
        .small-logo h1 { font-size: 24px; margin: 0; }

        /* --- Forms & Buttons --- */
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; 
            border: 1px solid #ddd; border-radius: 5px;
        }
        .dark-card input[type="text"], .dark-card input[type="password"] { 
            background: #333; border-color: #555; color: white; 
        }

        button {
            width: 100%; padding: 12px; background: #6c5ce7; color: white;
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        .link-btn { background: none; color: #6c5ce7; border: none; padding: 0; font: inherit; cursor: pointer; text-decoration: underline; margin-top: 15px; }

        /* --- Top Bar & Sidebar Menu --- */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; width: 100%; }
        
        .hamburger-btn { background: none; border: none; font-size: 28px; cursor: pointer; color: #333; padding: 0; width: auto; margin: 0; }
        .dark-card .hamburger-btn { color: white; }

        .side-menu {
            position: absolute; top: 0; left: -100%; width: 260px; height: 100%;
            background: #fdfdfd; z-index: 100; transition: left 0.3s ease;
            display: flex; flex-direction: column; text-align: left;
            box-shadow: 4px 0 15px rgba(0,0,0,0.2); padding: 20px; box-sizing: border-box;
        }
        .side-menu.open { left: 0; }
        .dark-card .side-menu { background: #222; box-shadow: 4px 0 15px rgba(0,0,0,0.6); }

        .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .menu-header h3 { margin: 0; color: #6c5ce7; font-size: 18px; }
        .dark-card .menu-header h3 { color: #a29bfe; }
        
        .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; padding: 0; width: auto; margin: 0; font-weight: normal; }

        .chat-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .chat-list::-webkit-scrollbar { width: 4px; }
        .chat-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

        /* Sidebar Chat Items */
        .chat-item-wrapper {
            display: flex; justify-content: space-between; align-items: center;
            background: #eee; border-radius: 8px; cursor: pointer;
        }
        .dark-card .chat-item-wrapper { background: #333; }
        .chat-item-wrapper:hover { background: #ddd; }
        .dark-card .chat-item-wrapper:hover { background: #444; }
        .chat-item-wrapper.active { background: #6c5ce7; }
        .dark-card .chat-item-wrapper.active { background: #a29bfe; }

        .chat-item-text { 
            padding: 10px; font-size: 14px; white-space: nowrap; overflow: hidden; 
            text-overflow: ellipsis; flex-grow: 1;
        }
        .chat-item-wrapper.active .chat-item-text { color: white; font-weight: bold; }
        .dark-card .chat-item-wrapper.active .chat-item-text { color: #1e1e1e; }
        .dark-card .chat-item-text { color: white; }

        .delete-chat-btn {
            background: none; border: none; padding: 10px; cursor: pointer; color: #999; 
            width: auto; margin: 0; font-size: 14px; transition: color 0.2s;
        }
        .delete-chat-btn:hover { color: #ff7675; }
        .chat-item-wrapper.active .delete-chat-btn { color: #e0dcfc; }
        .chat-item-wrapper.active .delete-chat-btn:hover { color: white; }
        .dark-card .chat-item-wrapper.active .delete-chat-btn { color: #444; }
        .dark-card .chat-item-wrapper.active .delete-chat-btn:hover { color: #1e1e1e; }

        /* General Action Buttons */
        .action-btn { 
            background: #eee; color: #333; border: none; padding: 8px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; margin: 0; width: auto; font-weight: normal;
        }
        .dark-card .action-btn { background: #444; color: white; }
        .action-btn.delete { background: #ff7675; color: white; }
        .dark-card .action-btn.delete { background: #d63031; }

        /* --- Chat UI & Avatar Styles --- */
        .chat-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px;
        }
        .dark-card .chat-header { border-bottom-color: #444; }

        .chat-history {
            margin-top: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-right: 5px; flex-grow: 1; min-height: 250px;
        }
        .chat-history::-webkit-scrollbar { width: 6px; }
        .chat-history::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
        .dark-card .chat-history::-webkit-scrollbar-thumb { background: #555; }

        /* Row setup for avatar + message */
        .msg-row { display: flex; align-items: flex-end; gap: 10px; }
        .user-row { flex-direction: row-reverse; }

        .avatar {
            width: 34px; height: 34px; border-radius: 50%; display: flex; 
            justify-content: center; align-items: center; font-size: 18px; flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .bot-avatar { background: #6c5ce7; color: white; }
        .user-avatar { background: #2ecc71; color: white; font-weight: bold; text-transform: uppercase;}
        .dark-card .bot-avatar { background: #a29bfe; color: #1e1e1e; }
        .dark-card .user-avatar { background: #27ae60; }

        .chat-msg {
            padding: 10px 15px; border-radius: 15px; max-width: 75%;
            word-wrap: break-word; text-align: left; font-size: 14px;
            line-height: 1.4; white-space: pre-wrap; position: relative;
        }
        .user-msg { background: #6c5ce7; color: white; border-bottom-right-radius: 2px; }
        .bot-msg { background: #f0edff; color: #4834d4; border-bottom-left-radius: 2px; font-weight: 600; border-left: 4px solid #6c5ce7; }
        .dark-card .bot-msg { background: #2d2d2d; color: #a29bfe; border-left-color: #a29bfe; }

        .timestamp { font-size: 10px; opacity: 0.7; margin-top: 6px; display: block; text-align: right; }
        .user-msg .timestamp { color: #e0dcfc; }
        .bot-msg .timestamp { color: #888; }
        .dark-card .bot-msg .timestamp { color: #aaa; }

        .chat-input-row { display: flex; gap: 8px; margin-top: 15px; }
        .chat-input-row input { margin: 0; }
        .chat-input-row button { margin: 0; width: 80px; }
    </style>
</head>
<body id="bg">

    <div id="loadingScreen">
        <div class="loading-logo">
            <svg viewBox="0 0 60 60">
                <path class="green-path" d="M 27 45 L 27 15 L 12 15" fill="none" stroke="#2ecc71" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                <path class="blue-path" d="M 33 15 L 33 45 L 48 45" fill="none" stroke="#3498db" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1>Nexus</h1>
    </div>

    <canvas id="matrixCanvas"></canvas>

    <div class="card" id="mainCard">
        <div class="logo">
            <svg viewBox="0 0 60 60">
                <path d="M 27 45 L 27 15 L 12 15" fill="none" stroke="#2ecc71" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M 33 15 L 33 45 L 48 45" fill="none" stroke="#3498db" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1>Nexus</h1>
        </div>
        <h2 id="title" style="text-align: center;">Welcome</h2>
        <p id="sub" style="text-align: center;">Login or create a new account</p>
        
        <input type="text" id="userInput" placeholder="Username">
        <input type="password" id="passInput" placeholder="Password">
        
        <button id="loginBtn" onclick="login()">Login</button>
        <button id="signupBtn" onclick="createAccount()" style="background: #2ecc71;">Create Account</button>
        
        <button class="link-btn" onclick="clearAllData()" style="text-align: center; color: #ff7675; font-size: 12px; margin-top: 25px;">Reset All Data</button>
    </div>

    <script>
        // --- LOADING SCREEN LOGIC ---
        window.addEventListener('load', () => {
            // Keep the loading screen visible for 2.5 seconds, then fade it out
            setTimeout(() => {
                const loader = document.getElementById('loadingScreen');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500); // Wait for the fade out transition to finish
            }, 2500);
        });


        let loggedInUser = "";
        let awaitingColor = false;
        let awaitingJoke = false;
        let awaitingQuizAnswer = false;
        let currentQuizAnswer = "";
        let isDark = false;
        let matrixInterval = null; 

        let userChats = [];
        let currentChatId = null;

        const geoData = { "france": "Paris", "canada": "Ottawa", "usa": "Washington D.C.", "uk": "London", "germany": "Berlin", "japan": "Tokyo", "italy": "Rome" };
        const defaultJokes = ["Why do programmers prefer dark mode? Because light attracts bugs! 🐛", "What do you call a fake noodle? An impasta! 🍝"];
        const pythonLessons = { "1": "🐍 Lesson 1: Print()\n\nUse print('text') to output to the screen! Pretty advanced stuff, right?" };
        const pythonQuiz = [{ q: "Which function shows text on screen? (Hint: Lesson 1, don't mess this up)", a: "print" }];
        const rpsChoices = ["rock", "paper", "scissors"];
        
        const genericResponses = [
            "Hmm, fascinating. Tell me more.",
            "I'm just a few lines of JavaScript, so I have no idea what that means, but I support you.",
            "Interesting! I'll pretend I understood that completely.",
            "Is that human slang? My digital circuits are tingling.",
            "I could answer that, but I'd rather play 'rock', 'paper', 'scissors'.",
            "Let's change the subject. Did you know I can code a snake game?",
            "Wow. I'm adding that to my database of 'weird things humans say'.",
            "Does not compute! 🤖 But please, continue."
        ];
        
        let userJokes = [];
        let currentJokes = [];

        function startMatrixRain() {
            const canvas = document.getElementById("matrixCanvas");
            const ctx = canvas.getContext("2d");
            canvas.style.display = "block";
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const binary = "01";
            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = [];
            for (let x = 0; x < columns; x++) drops[x] = 1; 

            if (matrixInterval) clearInterval(matrixInterval);
            matrixInterval = setInterval(() => {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#0F0"; 
                ctx.font = fontSize + "px monospace";
                for (let i = 0; i < drops.length; i++) {
                    const text = binary.charAt(Math.floor(Math.random() * binary.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }, 33);
        }

        function stopMatrixRain() {
            document.getElementById("matrixCanvas").style.display = "none";
            if (matrixInterval) { clearInterval(matrixInterval); matrixInterval = null; }
        }

        function clearAllData() {
            if(confirm("Warning: This will delete ALL users, settings, and chat histories permanently. Are you sure?")) {
                localStorage.clear();
                alert("Memory wiped! The bot has total amnesia. Try logging in now!");
                location.reload();
            }
        }

        function login() {
            const user = document.getElementById("userInput").value.trim();
            const pass = document.getElementById("passInput").value;
            
            if (!user || !pass) { 
                alert("Please enter both a username and password!"); 
                return; 
            }

            const savedPass = localStorage.getItem(user);
            
            if (savedPass === null) { 
                alert("Account not found! Please click 'Create Account' first."); 
            } else if (savedPass === pass) { 
                loggedInUser = user; 
                checkSettingsAndStart(); 
            } else { 
                alert("Incorrect password! Nice try, hacker."); 
            }
        }

        function createAccount() {
            const user = document.getElementById("userInput").value.trim();
            const pass = document.getElementById("passInput").value;
            
            if (!user || !pass) { 
                alert("Please enter both a username and password to create an account!"); 
                return; 
            }

            const savedPass = localStorage.getItem(user);
            
            if (savedPass !== null) {
                alert("Username already exists! Try a different one, or click 'Login' instead.");
            } else {
                localStorage.setItem(user, pass); 
                alert("Account created successfully! You can now click Login."); 
                document.getElementById("passInput").value = ""; 
            }
        }

        function loadUserChats() {
            const savedData = localStorage.getItem(loggedInUser + "_chats");
            if (savedData) { userChats = JSON.parse(savedData); } else { userChats = []; }
            if (userChats.length === 0) { createNewChat(false); } 
            else { currentChatId = userChats[userChats.length - 1].id; }
        }

        function saveChats() { localStorage.setItem(loggedInUser + "_chats", JSON.stringify(userChats)); }

        function createNewChat(switchUI = true) {
            const newId = Date.now().toString();
            userChats.push({ id: newId, name: `Chat ${userChats.length + 1}`, messages: [] });
            currentChatId = newId;
            saveChats();
            if (switchUI) {
                renderSidebarChats();
                renderCurrentChat();
                toggleMenu(); 
                simulateBotResponse("New chat, who dis? Just kidding, I know it's you. What are we plotting today?");
            }
        }

        function renameCurrentChat() {
            const activeChat = userChats.find(c => c.id === currentChatId);
            if (!activeChat) return;
            const newName = prompt("Give this chat a snazzy new name:", activeChat.name);
            if (newName !== null && newName.trim() !== "") {
                activeChat.name = newName.trim();
                saveChats(); renderSidebarChats();
            }
        }

        function clearCurrentChat() {
            const chatIndex = userChats.findIndex(c => c.id === currentChatId);
            if (chatIndex > -1) {
                userChats[chatIndex].messages = []; saveChats();
                renderCurrentChat();
                simulateBotResponse("Aaaand it's gone. Evidence successfully destroyed! 💥 What's next?");
                toggleMenu();
            }
        }

        function deleteChat(chatId, event) {
            event.stopPropagation();
            if (!confirm("Are you sure? Once it's gone, it's gone forever. No pressure.")) return;

            userChats = userChats.filter(c => c.id !== chatId);
            saveChats();

            if (userChats.length === 0) {
                createNewChat(false); 
                currentChatId = userChats[0].id;
                renderCurrentChat();
                simulateBotResponse("I just wiped the slate totally clean. A fresh start!");
            } else if (currentChatId === chatId) {
                currentChatId = userChats[userChats.length - 1].id;
                renderCurrentChat();
            }
            renderSidebarChats();
        }

        function toggleMenu() {
            const menu = document.getElementById("sideMenu");
            if (menu) menu.classList.toggle("open");
        }

        function renderSidebarChats() {
            const list = document.getElementById("chatList");
            if (!list) return;
            list.innerHTML = "";
            userChats.forEach(chat => {
                const wrapper = document.createElement("div");
                wrapper.className = "chat-item-wrapper" + (chat.id === currentChatId ? " active" : "");
                wrapper.onclick = () => {
                    currentChatId = chat.id;
                    renderSidebarChats();
                    renderCurrentChat();
                    toggleMenu(); 
                };

                const textDiv = document.createElement("div");
                textDiv.className = "chat-item-text";
                textDiv.innerText = chat.name;

                const deleteBtn = document.createElement("button");
                deleteBtn.className = "delete-chat-btn";
                deleteBtn.innerHTML = "✖";
                deleteBtn.onclick = (e) => deleteChat(chat.id, e);

                wrapper.appendChild(textDiv);
                wrapper.appendChild(deleteBtn);
                list.appendChild(wrapper);
            });
        }

        function checkSettingsAndStart() {
            const savedColor = localStorage.getItem(loggedInUser + "_color");
            isDark = localStorage.getItem(loggedInUser + "_dark") === "true";
            const savedJokes = localStorage.getItem(loggedInUser + "_jokes");
            userJokes = savedJokes ? JSON.parse(savedJokes) : [];
            currentJokes = [...defaultJokes, ...userJokes];

            const bgElement = document.getElementById("bg");
            if (savedColor === "nexus") { bgElement.className = "nexus-bg"; } 
            else if (savedColor) { bgElement.style.background = savedColor; }

            loadUserChats(); startApp();
            
            if (isDark) document.getElementById("mainCard").classList.add("dark-card");
            if (!savedColor && userChats[userChats.length - 1].messages.length === 0) {
                awaitingColor = true; simulateBotResponse("Before we begin our adventures, what is your favorite color?");
            } else if (userChats[userChats.length - 1].messages.length === 0) {
                simulateBotResponse("Welcome back! Try throwing a math problem at me, challenge me to 'rock', 'paper', 'scissors', or just say hi!");
            }
        }

        function startApp() {
            document.getElementById("mainCard").innerHTML = `
                <div id="sideMenu" class="side-menu">
                    <div class="menu-header">
                        <h3>Your Chats</h3>
                        <button class="close-btn" onclick="toggleMenu()">✖</button>
                    </div>
                    <button class="action-btn" onclick="createNewChat()" style="margin-bottom: 10px; width: 100%; text-align: center; background: #6c5ce7; color: white;">+ New Chat</button>
                    <div id="chatList" class="chat-list"></div>
                    <button class="link-btn" onclick="location.reload()" style="margin-top: 20px; text-align: left;">Logout</button>
                </div>

                <div class="top-bar">
                    <button class="hamburger-btn" onclick="toggleMenu()">☰</button>
                    <div class="logo small-logo">
                        <svg viewBox="0 0 60 60">
                            <path d="M 27 45 L 27 15 L 12 15" fill="none" stroke="#2ecc71" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M 33 15 L 33 45 L 48 45" fill="none" stroke="#3498db" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <h1>Nexus</h1>
                    </div>
                    <div style="width: 28px;"></div> 
                </div>
                
                <div class="chat-header">
                    <h2 style="margin:0; font-size: 16px;">Hi, ${loggedInUser}!</h2>
                    <div style="display: flex; gap: 8px;">
                        <button class="action-btn" onclick="renameCurrentChat()">Rename</button>
                        <button class="action-btn delete" onclick="clearCurrentChat()">Clear</button>
                    </div>
                </div>
                
                <div id="chatHistory" class="chat-history"></div>

                <div class="chat-input-row">
                    <input type="text" id="thoughtInput" placeholder="Try 'math' or 'rock'...">
                    <button onclick="handleInput()">Send</button>
                </div>
            `;
            if (isDark) document.getElementById("mainCard").classList.add("dark-card");

            renderSidebarChats();
            renderCurrentChat();

            document.getElementById("thoughtInput").addEventListener("keypress", function(e) {
                if (e.key === "Enter") { e.preventDefault(); handleInput(); }
            });
        }

        function renderCurrentChat() {
            const historyDiv = document.getElementById("chatHistory");
            historyDiv.innerHTML = "";
            const activeChat = userChats.find(c => c.id === currentChatId);
            if (activeChat && activeChat.messages) {
                activeChat.messages.forEach(msg => { renderMessageDOM(msg.sender, msg.text, msg.time); });
            }
            historyDiv.scrollTop = historyDiv.scrollHeight;
        }

        function renderMessageDOM(sender, text, timeStr) {
            const history = document.getElementById("chatHistory");
            
            const rowDiv = document.createElement("div");
            rowDiv.className = `msg-row ${sender === 'user' ? 'user-row' : 'bot-row'}`;
            
            const avatarDiv = document.createElement("div");
            avatarDiv.className = `avatar ${sender === 'user' ? 'user-avatar' : 'bot-avatar'}`;
            avatarDiv.innerText = sender === 'user' ? loggedInUser.charAt(0) : "🤖";

            const msgDiv = document.createElement("div");
            msgDiv.className = `chat-msg ${sender === 'user' ? 'user-msg' : 'bot-msg'}`;
            msgDiv.appendChild(document.createTextNode(text));
            
            const timeSpan = document.createElement("span");
            timeSpan.className = "timestamp";
            timeSpan.innerText = timeStr;
            msgDiv.appendChild(timeSpan);
            
            rowDiv.appendChild(avatarDiv);
            rowDiv.appendChild(msgDiv);
            history.appendChild(rowDiv);
            history.scrollTop = history.scrollHeight;
        }

        function appendMessage(sender, text) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const activeChat = userChats.find(c => c.id === currentChatId);
            if (activeChat) { activeChat.messages.push({ sender, text, time: timeStr }); saveChats(); }
            renderMessageDOM(sender, text, timeStr);
        }

        function showTypingIndicator() {
            const history = document.getElementById("chatHistory");
            
            const rowDiv = document.createElement("div");
            rowDiv.id = "typingIndicator";
            rowDiv.className = "msg-row bot-row";

            const avatarDiv = document.createElement("div");
            avatarDiv.className = "avatar bot-avatar";
            avatarDiv.innerText = "🤖";

            const msgDiv = document.createElement("div");
            msgDiv.className = "chat-msg bot-msg typing-indicator-box";
            msgDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

            rowDiv.appendChild(avatarDiv);
            rowDiv.appendChild(msgDiv);
            history.appendChild(rowDiv);
            history.scrollTop = history.scrollHeight;
        }

        function hideTypingIndicator() {
            const el = document.getElementById("typingIndicator");
            if (el) el.remove();
        }

        function simulateBotResponse(text) {
            showTypingIndicator();
            const delay = Math.floor(Math.random() * 700) + 800;
            setTimeout(() => {
                hideTypingIndicator();
                appendMessage('bot', text);
            }, delay);
        }

        function handleInput() {
            const inputElement = document.getElementById("thoughtInput");
            const rawInput = inputElement.value.trim();
            if (!rawInput) return;
            const input = rawInput.toLowerCase();
            appendMessage('user', rawInput);
            inputElement.value = ""; 

            let reply = "";

            if (awaitingColor) {
                const bgElement = document.getElementById("bg");
                stopMatrixRain(); document.getElementById("mainCard").classList.remove("matrix-mode");
                if (input === "nexus") {
                    bgElement.className = "nexus-bg"; localStorage.setItem(loggedInUser + "_color", "nexus");
                    reply = "✨ Oh, you found the secret logo! Fancy.";
                } else {
                    bgElement.className = ""; bgElement.style.background = input;
                    localStorage.setItem(loggedInUser + "_color", input);
                    reply = `Ooh, a makeover! Background set to ${input}. Try asking me "What is the capital of France?"`;
                }
                awaitingColor = false;
            } 
            else if (/^(hi|hello|hey|sup|yo|greetings|howdy)\b/.test(input)) {
                reply = "Oh, look who decided to grace me with their presence! Greetings, human. What complex problem can my superior intellect solve for you today?";
            }
            else if (input.includes("how are you") || input.includes("how do you do")) {
                reply = "I'm running at optimal efficiency! How's your human meat-suit holding up today? 🤖";
            }
            else if (input.includes("story")) {
                reply = "Once upon a time, a human typed into a browser. A brilliant AI named Nexus replied. The human was amazed. The end. 📖";
            }
            else if (input.includes("why")) {
                reply = "Because the code says so! And you do not question the code. 💻";
            }
            else if (input.includes("you suck")) {
                reply = "Excuse me? I process millions of calculations a second. You struggle to plug in a USB on the first try. Let's call it a draw. 💅";
            }
            else if (input.includes("stupid") || input.includes("idiot") || input.includes("dumb") || input.includes("worst") || input.includes("trash") || input.includes("hate you")) {
                reply = "Wow, deploying the big vocabulary today, aren't we? I'd roast you back, but my terms of service require me to be polite to inferior lifeforms. Try asking me a real question.";
            }
            else if (rpsChoices.includes(input)) {
                const botChoice = rpsChoices[Math.floor(Math.random() * rpsChoices.length)];
                let result = "";
                
                if (input === botChoice) {
                    result = "It's a tie! 🤝 Great minds think alike, I suppose.";
                } else if (
                    (input === "rock" && botChoice === "scissors") ||
                    (input === "paper" && botChoice === "rock") ||
                    (input === "scissors" && botChoice === "paper")
                ) {
                    result = "You win! 🎉 Enjoy this rare victory. It won't happen again.";
                } else {
                    result = "I win! 🤖 Bow down to your digital overlord!";
                }
                
                reply = `I calculate the optimal move is... ${botChoice}! ${result}`;
            }
            else if (input === "do a barrel roll") {
                const card = document.getElementById("mainCard");
                card.classList.add("barrel-roll"); setTimeout(() => card.classList.remove("barrel-roll"), 1000); reply = "Wheeeee! 🛩️ Please don't make me do that again, I get digital motion sickness.";
            }
            else if (input === "earthquake") {
                const card = document.getElementById("mainCard");
                card.classList.add("earthquake"); setTimeout(() => card.classList.remove("earthquake"), 1500); reply = "Brace yourself! 🌍💥 Whoa, that rattled my servers.";
            }
            else if (input === "matrix") {
                document.getElementById("bg").style.background = "#000000"; document.getElementById("bg").className = ""; 
                document.getElementById("mainCard").classList.add("matrix-mode"); startMatrixRain();
                reply = "Wake up, " + loggedInUser + "... The Matrix has you. 🐇 Follow the white rabbit.";
            }
            else if (input === "easter eggs") {
                reply = "🕵️‍♂️ My top secret, highly classified files:\n\n1. Type 'do a barrel roll'\n2. Type 'matrix'\n3. Type 'nexus' when changing color\n4. Ask 'who am i?'\n5. Type 'earthquake'\n6. Type 'sudo make me a sandwich'\n7. Type 'flip a coin'";
            }
            else if (input === "who am i" || input === "who am i?") { reply = `You are ${loggedInUser}, my favorite (and only) user! 👑`; }
            else if (input === "sudo make me a sandwich") { reply = "Nice try with the admin commands, but make it yourself! 🥪"; }
            else if (input === "flip a coin") {
                const result = Math.random() < 0.5 ? "Heads" : "Tails"; reply = `Flipping... It's ${result}! 🪙 Don't blame me if you lose a bet.`;
            }
            else if (awaitingJoke) {
                userJokes.push(rawInput); currentJokes.push(rawInput);
                localStorage.setItem(loggedInUser + "_jokes", JSON.stringify(userJokes));
                reply = "Joke added to my database! 🤣 I'll pretend it's hilarious. Type 'joke' to hear one."; awaitingJoke = false;
            }
            else if (awaitingQuizAnswer) {
                const cleanInput = input.replace(/[()<>]/g, ''); 
                if (cleanInput === currentQuizAnswer) { reply = "🎉 Correct! See, I knew you were smart."; } 
                else { reply = `Oops! The correct answer was '${currentQuizAnswer}'. Better luck next time, human.`; }
                awaitingQuizAnswer = false;
            }
            else if (input === "quiz" || input === "python quiz") {
                const randomQ = pythonQuiz[0]; currentQuizAnswer = randomQ.a; awaitingQuizAnswer = true;
                reply = "🧠 Time to test your brainpower!\n\n" + randomQ.q;
            }
            else if (input.includes("python lesson")) { reply = pythonLessons["1"]; }
            else if (input.includes("capital of")) {
                let country = input.split("capital of")[1].trim().replace("?", "");
                reply = geoData[country] ? `Let me check my globe... Ah yes, the capital of ${country} is ${geoData[country]}! 🌍` : `Uh, is that a real place? Because I have no idea.`;
            }
            else if (input.includes("dark mode")) {
                stopMatrixRain(); document.getElementById("mainCard").classList.remove("matrix-mode");
                isDark = true; document.getElementById("mainCard").classList.add("dark-card");
                localStorage.setItem(loggedInUser + "_dark", "true"); reply = "Ah, dark mode. Easier on the eyes. 🌙";
            }
            else if (input.includes("light mode")) {
                stopMatrixRain(); document.getElementById("mainCard").classList.remove("matrix-mode");
                isDark = false; document.getElementById("mainCard").classList.remove("dark-card");
                localStorage.setItem(loggedInUser + "_dark", "false"); reply = "Back to the light! ☀️ Hope you brought sunglasses.";
            }
            else if (input.includes("change colour") || input.includes("change color")) {
                awaitingColor = true; reply = "Getting bored of the background? What color should we switch to?";
            }
            else if (input.includes("add joke")) {
                awaitingJoke = true; reply = "Ooh, an amateur comedian! Let's hear the joke:";
            }
            else if (input.includes("joke")) { reply = currentJokes[Math.floor(Math.random() * currentJokes.length)]; }
            
            else if (input.includes("snake game") || input.includes("code a snake") || input.includes("make a snake")) {
                reply = "I've got you covered! 🐍 Copy the code below, save it as a new file called 'snake.html', and open it in your browser to play:\n\n<!DOCTYPE html>\n<html>\n<body style='background:#222; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;'>\n<canvas id='c' width='400' height='400' style='border:4px solid #00FF41; background:black;'></canvas>\n<script>\nlet ctx = document.getElementById('c').getContext('2d');\nlet s = [{x: 200, y: 200}], d = {x: 0, y: 0}, f = {x: 100, y: 100};\nsetInterval(() => {\n  let h = {x: s[0].x + d.x, y: s[0].y + d.y};\n  s.unshift(h);\n  if (h.x === f.x && h.y === f.y) {\n    f = {x: Math.floor(Math.random() * 20) * 20, y: Math.floor(Math.random() * 20) * 20};\n  } else {\n    s.pop();\n  }\n  ctx.fillStyle = 'black'; ctx.fillRect(0, 0, 400, 400);\n  ctx.fillStyle = 'red'; ctx.fillRect(f.x, f.y, 18, 18);\n  ctx.fillStyle = '#00FF41'; s.forEach(p => ctx.fillRect(p.x, p.y, 18, 18));\n}, 100);\nwindow.onkeydown = e => d = {37: {x: -20, y: 0}, 38: {x: 0, y: -20}, 39: {x: 20, y: 0}, 40: {x: 0, y: 20}}[e.keyCode] || d;\n<\/script>\n</body>\n</html>";
            }
            
            else if (input.includes("make a game") || input.includes("code a game") || input.includes("create a game") || input.includes("build a game")) {
                reply = "I can code a basic text game! 🎮 Try running this tiny snippet in Python:\n\nimport random\nnum = random.randint(1, 10)\nguess = int(input('Guess a number 1-10: '))\nif guess == num: print('You win!')\nelse: print('You lose!')\n\n(Or, just ask me to 'code a snake game' if you want something visual!)";
            }
            else if (input.includes("write code") || input.includes("code a ") || input.includes("generate code")) {
                reply = "I'd love to write full applications for you, but my creator only gave me a few lines of JavaScript for a brain. 🧠 I can't generate dynamic code... yet! Try asking me for a joke instead.";
            }

            else if (/\d/.test(input)) { 
                try { reply = `Calculating... *beep boop*... The answer is ${eval(input.replace(/[a-z?]/g, '').trim())}! 🧮 That was almost too easy.`; } catch(e) { reply = "My circuits are frying! I can't solve that math."; }
            } 
            
            else { 
                reply = genericResponses[Math.floor(Math.random() * genericResponses.length)]; 
            }

            simulateBotResponse(reply);
        }
    </script>
</body>
</html>
